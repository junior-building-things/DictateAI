name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Derive release version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build macOS app
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Create updater artifacts
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: ./scripts/create-updater-artifacts.sh "${VERSION}" "${GITHUB_REF_NAME}"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: DictateAI ${{ github.ref_name }}
          body: |
            Signed updater artifacts for DictateAI.

            Website installers remain separate; installed apps should use the in-app updater.
          draft: false
          prerelease: false
          files: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/DictateAI_${{ env.VERSION }}_aarch64.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/DictateAI.app.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/DictateAI.app.tar.gz.sig
            src-tauri/target/aarch64-apple-darwin/release/bundle/latest.json
          fail_on_unmatched_files: true
          overwrite_files: true
